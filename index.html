<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="/styles/css/styles.css" />
    <script src="scripts/main.js" defer type="module"></script>
    <title>Frontend Mentor | Tip calculator app</title>
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div id="container">
      <header class="splitter"><span>SPLI</span><span>TTER</span></header>

      <main class="calculator">
        <div class="calculation">
          <div class="bill-container">
            <label for="bill" class="main-label">Bill</label>
            <div class="input-container">
              <!-- !! NEW THING - **draggable -->
              <label for="bill"
                ><img
                  class="icon"
                  src="./images/icon-dollar.svg"
                  alt=""
                  draggable="false"
              /></label>
              <!-- !! NEW THING - **onmousewheel to disable the scroll inside the inputs of type number -->
              <input
                type="number"
                name="bill"
                id="bill"
                placeholder="0"
                min="0"
                onmousewheel="return false;"
                class="floating-value"
              />
            </div>
          </div>
          <div class="percentage-container">
            <p>Select Tip %</p>
            <ul>
              <li>
                <button type="button" class="btn percentage-btn">5%</button>
              </li>
              <li>
                <button type="button" class="btn percentage-btn">10%</button>
              </li>
              <li>
                <button type="button" class="btn percentage-btn">15%</button>
              </li>
              <li>
                <button type="button" class="btn percentage-btn">25%</button>
              </li>
              <li>
                <button type="button" class="btn percentage-btn">50%</button>
              </li>
              <li>
                <button type="button" class="btn percentage-btn custom">
                  Custom
                </button>
              </li>
            </ul>
          </div>
          <div class="custom-percentage-container hidden">
            <label for="custom-percentage" class="main-label">Custom %</label>
            <div class="input-container">
              <!-- !! NEW THING - **draggable -->
              <label for="custom-percentage"
                ><img
                  class="icon"
                  src="./images/icon-percentage.svg"
                  alt=""
                  draggable="false"
              /></label>
              <input
                type="number"
                name="custom-percentage"
                id="custom-percentage"
                placeholder="0"
                min="0"
                onmousewheel="return false;"
                class="floating-value"
              />
            </div>
          </div>

          <div class="number-ppl-container">
            <label for="number-ppl" class="main-label">Number of People</label>
            <div class="input-container">
              <!-- !! NEW THING - ** draggable -->
              <label for="number-ppl"
                ><img
                  class="icon"
                  src="./images/icon-person.svg"
                  alt=""
                  draggable="false"
              /></label>
              <input
                type="number"
                name="number-ppl"
                id="number-ppl"
                placeholder="1"
                min="1"
                onmousewheel="return false;"
                class="absolute-value"
              />
            </div>
          </div>
        </div>

        <div class="result">
          <div class="sums">
            <div class="tip">
              <div class="wording-container">
                <p>Tip Amount</p>
                <p>/ person</p>
              </div>
              <p class="tip-sum">$<span>0.00</span></p>
            </div>

            <div class="total">
              <div class="wording-container">
                <p>Total</p>
                <p>/ person</p>
              </div>
              <p class="total-sum">$<span>0.00</span></p>
            </div>
          </div>

          <button type="button" class="btn reset-btn" disabled>Reset</button>
        </div>
      </main>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
